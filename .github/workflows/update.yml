name: Scrape Prices

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-0 \
            libgomp1 \
            libsm6 \
            libxext6 \
            libxrender-dev \
            libgl1-mesa-dev
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel
          pip install numpy==1.24.3
          pip install torch==2.0.1 --index-url https://download.pytorch.org/whl/cpu
          pip install torchvision==0.15.2 --index-url https://download.pytorch.org/whl/cpu
          pip install opencv-python-headless==4.8.1.78
          pip install easyocr==1.7.0
          pip install -r requirements.txt
      
      - name: Setup credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: echo "$GOOGLE_CREDENTIALS_JSON" > credentials.json
      
      - name: Create images directory
        run: mkdir -p images_resotainer
      
      - name: Run scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python updater_prices.py
      
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update $(date +'%Y-%m-%d')"
          git push || echo "No changes to push"
