name: Mise à jour des prix containers

on:
  schedule:
    # Tous les jours à 8h00 et 20h00
    - cron: '0 8,20 * * *'
  # Permet une exécution manuelle depuis l'interface GitHub
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 gspread google-auth
      
      - name: Run price scraper
        run: python updater_prices.py
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      
      - name: Upload logs (if error)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: |
            *.log
            *.txt
